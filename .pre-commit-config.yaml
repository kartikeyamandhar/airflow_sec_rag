# Pre-commit hooks.
#
# The ruff/mypy hooks below are `local` and call the SAME uv-managed tools that
# `make` and CI use, reading the SAME pyproject.toml config. This is deliberate:
# it stops the three gates (local make / CI / pre-commit) from silently drifting
# apart (Phase 0 red-team, Q6). Standard hygiene hooks come from pre-commit-hooks.
#
# Install once:  uv run pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key # cheap, zero-config secret guard

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff check (--fix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false # mypy runs over the `files` set in pyproject.toml
        require_serial: true
