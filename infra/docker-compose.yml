# Local development services for SEC RAG.
#
# Phase 1 needs Postgres (filing index and job checkpoints). Qdrant arrives in
# Phase 3 and its service block is reserved below, commented out.
#
# Bring up:   make db-up      (or: docker compose -f infra/docker-compose.yml up -d)
# Tear down:  make db-down
#
# Credentials here are local-only defaults and match the Settings.database_url
# default. They are NOT secrets and never apply to any deployed environment.

services:
  postgres:
    image: postgres:16
    container_name: sec_rag_postgres
    environment:
      POSTGRES_USER: sec_rag
      POSTGRES_PASSWORD: sec_rag
      POSTGRES_DB: sec_rag
    ports:
      # Host port is overridable so a local Postgres on 5432 does not collide.
      # Default stays 5432; set SEC_RAG_PG_PORT (e.g. 5433) and DATABASE_URL to match.
      - "${SEC_RAG_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sec_rag -d sec_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sec_rag_qdrant
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
